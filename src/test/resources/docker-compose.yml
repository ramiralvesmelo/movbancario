#docker run -d --name redis -p 6379:6379 redis
services:
  redis:
    image: redis:7
    container_name: redis-movbancario
    ports:
      - "6379:6379"
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
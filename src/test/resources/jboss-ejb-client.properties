# IP ou Hostname do servidor remoto
#remote.connection.default.host=10.10.253.157
remote.connection.default.host=localhost
# Porta para a conexăo remota
remote.connection.default.port=4447
# Nome da conexăo remota padrăo
remote.connections=default 
# Usuário para autenticaçăo da conexăo remota.
remote.connection.default.username=root
# Senha para autenticaçăo da conexăo remota.
remote.connection.default.password=1.root.1
# Configuraçăo para desativar SSL na conexăo remota
remote.connectionprovider.create.options.org.xnio.Options.SSL_ENABLED=false
# Desativar política para rejeitas conexőes anônimas
remote.connection.default.connect.options.org.xnio.Options.SASL_POLICY_NOANONYMOUS=false
